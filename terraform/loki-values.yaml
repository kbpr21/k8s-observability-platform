loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 2Gi
# Disable memcached to save RAM
chunksCache:
  enabled: false
resultsCache:
  enabled: false
memcached:
  enabled: false
# Disable unused components
gateway:
  enabled: false
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0
